name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  release:
    types: [published]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore NuGet packages
        run: dotnet restore NotePadMod/NotePadMod.csproj

      - name: Build
        run: dotnet build NotePadMod/NotePadMod.csproj --configuration Release --no-restore

      - name: Upload DLL as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NotePadMod
          path: NotePadMod/bin/Release/net6.0/NotePadMod.dll

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: NotePadMod/bin/Release/net6.0/NotePadMod.dll
